<!doctype html><html><head><meta charset="utf-8"><title>Wire Row - Jewelry Wire Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#181A22;color:#EDEDF6;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:24px}
.wrap{max-width:560px}
h1{color:#8E8FCB;font-size:2.2rem;margin-bottom:.5rem}
p{font-size:1.1rem;line-height:1.5;opacity:.85}
a{color:#8E8FCB;text-decoration:none;margin:0 10px}
.foot{margin-top:2rem;font-size:.85rem;opacity:.6}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8E8FCB55 0%, #8E8FCB00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Wire Row - Jewelry Wire Log</h1>
<p>Track wire-wrapping projects with gauge, metal type, and stone pairings.</p>

</div></body></html>
