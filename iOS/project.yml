name: wirerow
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  wirerow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Wire Row - Jewelry Wire Log
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jewelrywirelog
        PRODUCT_NAME: Wire Row - Jewelry Wire Log
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - wirerowTests
        - wirerowUITests
  wirerowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: wirerow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jewelrywirelog.tests
        GENERATE_INFOPLIST_FILE: true
  wirerowUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: wirerow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jewelrywirelog.uitests
        GENERATE_INFOPLIST_FILE: true
